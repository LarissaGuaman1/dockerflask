- name: Probar SSH en el VPS
  uses: appleboy/ssh-action@v1.0.3
  with:
    host: ${{ secrets.VPS_HOST }}
    username: ${{ secrets.VPS_USER }}
    password: ${{ secrets.VPS_PASSWORD }}
    port: ${{ secrets.VPS_PORT }}
    timeout: 60s
    script: |
      echo "Conexión SSH correcta"
      hostname
      whoami
      pwd
      docker --version