name: Landing PAGE quinto A

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.11
      uses: actions/setup-python@v3
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: pip install -r requirements.txt
    
    - name: Costruir imagen de docker
      run: docker build -t ghcr.io/larissaguaman1/landingquintoa:1.0.0 .
    
    - name: Login en GitHub Container Registry
      run: echo "${{ secrets.GHCR_TOKEN}}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
    
    - name: Publicar la imagen creada
      run: docker push ghcr.io/larissaguaman1/landingquintoa:1.0.0
    - name: mostrar variables (solo locales, no secrets)
      run: |
        echo "Provando conexion SSH con:"
        echo "Host: ${{ secrets.VPS_HOST }}"
        echo "Usuario: ${{ secrets.VPS_USER }}"
        echo "Puerto: ${{ secrets.VPS_PORT }}"
        echo "Password: ${{ secrets.VPS_PASSWORD }}"

    - name: Probar la ssh en el vps
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.VPS_HOST }}   
        username: ${{ secrets.VPS_USER }}
        password: ${{ secrets.VPS_PASSWORD }}
        port: ${{ secrets.VPS_PORT }}
        script: |
          echo "Probando conexion  ssh"
          hostname
          whoami
          update
