name: Flask Docker Deploy

on:
push:
branches:
- main

permissions:
contents: read
packages: write

jobs:
build-and-push:
runs-on: ubuntu-latest


  - name: Descargar código
    uses: actions/checkout@v4

  - name: Login en GitHub Container Registry
    run: echo "${{ secrets.TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

  - name: Construir imagen Docker
    run: docker build -t ghcr.io/larissaguaman1/dockerflask:1.0.0 .

  - name: Publicar imagen en GHCR
    run: docker push ghcr.io/larissaguaman1/dockerflask:1.0.0
```

deploy:
needs: build-and-push
runs-on: ubuntu-latest

```
steps:
  - name: Conectarse al servidor y desplegar
    uses: appleboy/ssh-action@v1.0.3
    with:
      host: ${{ secrets.VPS_SERVER }}
      username: ${{ secrets.VPS_USER }}
      password: ${{ secrets.VPS_PASSWORD }}
      port: ${{ secrets.VPS_PORT }}
      script: |
        docker login ghcr.io -u larissaguaman1 -p ${{ secrets.TOKEN }}
        docker pull ghcr.io/larissaguaman1/dockerflask:1.0.0
        docker rm -f holaflask || true
        docker run -d \
          --name holaflask \
          -p 5000:5000 \
          ghcr.io/larissaguaman1/dockerflask:1.0.0
```
